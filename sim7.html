<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>銅の製錬（電気分解）シミュレーター</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #fdfdfd; font-family: 'Hiragino Sans', sans-serif; touch-action: none; }
        
        #message-area {
            position: absolute; top: 0; width: 100%; background: rgba(255, 255, 255, 0.95);
            color: #333; padding: 15px; text-align: center; font-size: 15px; font-weight: bold;
            border-bottom: 2px solid #ddd; box-sizing: border-box; z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); min-height: 70px;
        }

        .btn-container {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: center; gap: 15px; z-index: 100;
        }

        .btn {
            background: #2c3e50; color: white; border: none; padding: 12px 20px;
            border-radius: 20px; font-weight: bold; cursor: pointer; text-decoration: none;
            font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        #reset-btn { background: #e74c3c; }
    </style>
</head>
<body>

<div id="message-area">
    手順：スイッチをタップして電気分解を開始してください。<br>陽極（粗銅）、陰極（純銅）、電解液（CuSO₄水溶液）。
</div>

<div class="btn-container">
    <button class="btn" id="reset-btn" onclick="resetSim()">リセット</button>
    <a href="index.html" class="btn">メニューへ戻る</a>
</div>

<script>
    // --- 状態変数 ---
    let isRunning = false; 
    let particles = []; 
    let drawCount = 0; 
    
    // --- 器具のパラメータ ---
    let cellX, cellY, cellW, cellH; // 電解槽
    let anodeX, cathodeX, electrodeY, electrodeW_init, electrodeH_init; // 電極
    let anodeW, cathodeW; // 現在の電極の厚さ
    let powerX, powerY, powerW, powerH; // 電源
    let switchX, switchY, switchW, switchH; // スイッチ

    // --- 粒子のパラメータ ---
    let particleSize = 10;
    let cuColor, so4Color, electronColor, auColor, agColor;

    // --- 失敗・解説判定用 ---
    let isFinished = false;

    function setup() {
        createCanvas(windowWidth, windowHeight);
        angleMode(DEGREES);
        
        cuColor = color(200, 100, 50); // 銅イオン
        so4Color = color(255, 255, 255); // 硫酸イオン
        electronColor = color(255, 255, 0); // 電子
        auColor = color(220, 180, 50); // 金（陽極泥）
        agColor = color(200); // 銀（陽極泥）

        calculatePositions();
        resetSim(); 
    }

    // リセット機能
    window.resetSim = function() {
        isRunning = false; 
        particles = []; 
        drawCount = 0; 
        isFinished = false;
        
        anodeW = electrodeW_init; 
        cathodeW = electrodeW_init; 

        calculatePositions(); 
        initIons(); // 初期イオンの配置
        updateMessage();
    };

    function calculatePositions() {
        let deskLevel = height - 140; 
        
        cellW = width * 0.8;
        cellH = height * 0.4;
        cellX = (width - cellW) / 2;
        cellY = deskLevel - cellH - 30;

        electrodeW_init = 25;
        electrodeH_init = cellH - 40;
        anodeX = cellX + 50; // 陽極は左側
        cathodeX = cellX + cellW - 50 - electrodeW_init; // 陰極は右側
        electrodeY = cellY + 20;

        powerW = 60; powerH = 40;
        powerX = width / 2 - powerW - 20;
        powerY = height * 0.25;

        switchW = 50; switchH = 30;
        switchX = width / 2 + 20;
        switchY = height * 0.25 + (powerH - switchH) / 2;
    }

    function initIons() {
        // 電解液中にあらかじめ銅イオンと硫酸イオンを漂わせておく
        for (let i = 0; i < 15; i++) {
            particles.push({
                x: random(cellX + 10, cellX + cellW - 10),
                y: random(cellY + 10, cellY + cellH - 10),
                type: "cu2+",
                vx: random(-0.5, 0.5),
                vy: random(-0.5, 0.5),
                color: cuColor
            });
            particles.push({
                x: random(cellX + 10, cellX + cellW - 10),
                y: random(cellY + 10, cellY + cellH - 10),
                type: "so42-",
                vx: random(-0.5, 0.5),
                vy: random(-0.5, 0.5),
                color: so4Color
            });
        }
    }

    function draw() {
        background(250); 
        drawCount++;

        // 実験台（机）
        fill(220, 220, 225); noStroke();
        rect(0, height - 140, width, 140);
        stroke(180); strokeWeight(2);
        line(0, height - 140, width, height - 140);

        drawCell();
        drawElectrodes();
        drawCircuit();
        drawLegend(); 
        
        if (isRunning) {
            updateSim();
        }
        drawParticles();
        drawLabels(); // 文字を一番上に描画してかぶりを防ぐ
        
        checkFinished();
    }

    function drawLegend() {
        fill(255, 255, 255, 220); stroke(150); strokeWeight(1);
        rect(10, 80, 160, 115, 5);
        
        fill(50); noStroke(); textAlign(LEFT); textSize(12); textStyle(BOLD);
        text("【粒子の意味】", 15, 100);
        
        fill(cuColor); ellipse(25, 120, particleSize);
        fill(50); text("銅イオン (Cu²⁺)", 40, 124);
        
        fill(so4Color); stroke(150); strokeWeight(1); ellipse(25, 142, particleSize);
        noStroke(); fill(50); text("硫酸イオン (SO₄²⁻)", 40, 146);
        
        fill(electronColor); noStroke(); ellipse(25, 164, particleSize);
        fill(50); text("電子 (e⁻)", 40, 168);

        fill(auColor); noStroke(); ellipse(20, 186, 6);
        fill(agColor); ellipse(30, 186, 6);
        fill(50); text("陽極泥 (Au, Ag等)", 40, 190);
    }

    function drawCell() {
        fill(240, 248, 255); stroke(100); strokeWeight(2);
        rect(cellX, cellY, cellW, cellH, 5);
        
        fill(173, 216, 230); // 硫酸銅水溶液
        rect(cellX + 5, cellY + 5, cellW - 10, cellH - 10, 3);
        
        // 電解液の文字背景
        fill(255, 255, 255, 180); noStroke();
        rect(cellX + cellW / 2 - 65, cellY + cellH - 22, 130, 18, 3);
        fill(50); textSize(12); textStyle(BOLD); textAlign(CENTER);
        text("電解液 (CuSO₄水溶液)", cellX + cellW / 2, cellY + cellH - 10);
    }

    function drawElectrodes() {
        stroke(50); strokeWeight(2);
        // 陽極（粗銅・太い）
        fill(180, 130, 80); 
        rect(anodeX, electrodeY, anodeW, electrodeH_init, 2);
        
        // 陰極（純銅・細い）
        fill(210, 180, 130); 
        rect(cathodeX, electrodeY, cathodeW, electrodeH_init, 2);
    }

    // テキストのかぶりを防ぐため、まとめて背景付きで描画
    function drawLabels() {
        noStroke();

        // 電極の上のラベル背景と文字
        fill(255, 255, 255, 200);
        rect(anodeX + electrodeW_init / 2 - 40, electrodeY - 22, 80, 18, 3);
        rect(cathodeX + electrodeW_init / 2 - 40, electrodeY - 22, 80, 18, 3);
        
        fill(50); textSize(13); textStyle(BOLD); textAlign(CENTER);
        text("陽極 (粗銅)", anodeX + electrodeW_init / 2, electrodeY - 9);
        text("陰極 (純銅)", cathodeX + electrodeW_init / 2, electrodeY - 9);

        // 電極の下の化学式背景と文字
        fill(255, 255, 255, 200);
        rect(anodeX + electrodeW_init / 2 - 50, electrodeY + electrodeH_init + 10, 100, 16, 3);
        rect(cathodeX + electrodeW_init / 2 - 50, electrodeY + electrodeH_init + 10, 100, 16, 3);

        fill(0); textSize(11); textStyle(NORMAL);
        text("Cu → Cu²⁺ + 2e⁻", anodeX + electrodeW_init / 2, electrodeY + electrodeH_init + 22);
        text("Cu²⁺ + 2e⁻ → Cu", cathodeX + electrodeW_init / 2, electrodeY + electrodeH_init + 22);
    }

    function drawCircuit() {
        stroke(100); strokeWeight(4); noFill();
        
        // 導線（電子の通り道）
        line(anodeX + anodeW / 2, electrodeY, anodeX + anodeW / 2, powerY + powerH / 2);
        line(anodeX + anodeW / 2, powerY + powerH / 2, powerX, powerY + powerH / 2);
        line(cathodeX + cathodeW / 2, electrodeY, cathodeX + cathodeW / 2, powerY + powerH / 2);
        line(cathodeX + cathodeW / 2, powerY + powerH / 2, switchX + switchW, powerY + powerH / 2);
        line(powerX + powerW, powerY + powerH / 2, switchX, powerY + powerH / 2);

        // 電源
        fill(40); stroke(20); strokeWeight(1);
        rect(powerX, powerY, powerW, powerH, 5);
        fill(255); noStroke(); textSize(16); textStyle(BOLD); textAlign(CENTER);
        text("電源", powerX + powerW / 2, powerY + powerH / 2 + 6);
        
        // スイッチ
        stroke(100); strokeWeight(2);
        push();
        translate(switchX, switchY);
        if (isRunning) {
            line(0, switchH / 2, switchW, switchH / 2); 
            fill(255, 255, 255, 180); noStroke(); rect(switchW / 2 - 15, switchH / 2 + 5, 30, 18, 3);
            fill(100); text("ON", switchW / 2, switchH / 2 + 19);
        } else {
            line(0, switchH / 2, switchW / 2, 0); 
            line(switchW / 2, 0, switchW, switchH / 2);
            fill(255, 255, 255, 180); noStroke(); rect(switchW / 2 - 15, switchH / 2 + 5, 30, 18, 3);
            fill(100); text("OFF", switchW / 2, switchH / 2 + 19);
        }
        pop();
        
        fill(200, 50, 50); textStyle(BOLD); textSize(18); text("+", powerX + 5, powerY + powerH / 2 + 6);
        fill(50, 50, 200); text("-", powerX + powerW - 10, powerY + powerH / 2 + 6);
    }

    function drawParticles() {
        particles.forEach(p => {
            fill(p.color);
            if(p.type === "so42-") {
                stroke(150); strokeWeight(1);
            } else {
                noStroke();
            }
            // 陽極泥は少し小さく描画
            let size = (p.type === "slime") ? particleSize * 0.6 : particleSize;
            ellipse(p.x, p.y, size);
        });
    }

    function updateSim() {
        // 陽極から銅イオンと電子、陽極泥を生成
        if (drawCount % 40 === 0 && anodeW > 5) {
            // 銅イオンが溶け出す
            let p = {
                x: anodeX + anodeW,
                y: random(electrodeY + 10, electrodeY + electrodeH_init - 10),
                type: "cu2+",
                vx: random(1, 1.5), 
                vy: random(-0.2, 0.2),
                color: cuColor
            };
            particles.push(p);
            
            // 電子（陽極から出て陰極へ向かう）
            let e1 = { x: anodeX + anodeW/2, y: electrodeY, type: "electron", vx: 0, vy: -3, color: electronColor, stage: 1 };
            let e2 = { x: anodeX + anodeW/2, y: electrodeY + 15, type: "electron", vx: 0, vy: -3, color: electronColor, stage: 1 };
            particles.push(e1, e2);
            
            // 陽極泥（AuやAgなど）の沈殿
            if (random() < 0.3) {
                let sColor = random() > 0.5 ? auColor : agColor;
                let slime = {
                    x: anodeX + random(0, anodeW),
                    y: electrodeY + electrodeH_init,
                    type: "slime",
                    vx: 0,
                    vy: random(1, 2),
                    color: sColor
                };
                particles.push(slime);
            }

            // 陽極が少し細くなる
            anodeW -= 0.2;
        }
        
        // 粒子の移動と判定（逆順ループ）
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            
            if (p.type === "electron") {
                // 電子の導線上の移動（右側の陰極へしっかり向かう）
                if (p.stage === 1) { // 陽極(左)から上へ
                    p.y += p.vy;
                    if (p.y <= powerY + powerH / 2) { 
                        p.y = powerY + powerH / 2; 
                        p.stage = 2; 
                        p.vx = 4; // 右へ進む
                        p.vy = 0; 
                    }
                } else if (p.stage === 2) { // 導線を右（電源・スイッチを通過して陰極方向）へ
                    p.x += p.vx;
                    if (p.x >= cathodeX + cathodeW / 2) { 
                        p.x = cathodeX + cathodeW / 2; 
                        p.stage = 3; 
                        p.vx = 0; 
                        p.vy = 3; // 下へ降りる
                    }
                } else if (p.stage === 3) { // 陰極へ降りる
                    p.y += p.vy;
                    if (p.y >= electrodeY + 10) { 
                        particles.splice(i, 1); // 陰極に到達して消費
                        continue;
                    }
                }
            } else if (p.type === "slime") {
                // 陽極泥の落下
                p.y += p.vy;
                if (p.y >= cellY + cellH - 5) {
                    p.vy = 0; // 底にたまる
                }
            } else {
                // イオンの移動
                p.x += p.vx;
                p.y += p.vy;
                
                // 電解液の壁でバウンド
                if (p.y >= cellY + cellH - 10 || p.y <= cellY + 5) p.vy *= -1;
                if (p.x <= cellX + 5) p.vx *= -1;

                if (p.type === "cu2+") {
                    p.x += 0.5; // 電源ON時は陰極（右）へ引かれる
                    
                    if (p.x >= cathodeX && p.y >= electrodeY && p.y <= electrodeY + electrodeH_init) {
                        cathodeW += 0.2;
                        particles.splice(i, 1);
                        continue;
                    }
                } else if (p.type === "so42-") {
                    p.x -= 0.2; // 硫酸イオンは陽極（左）へ少し引かれる
                    if (p.x >= cathodeX) p.vx *= -1;
                }
            }
        }
    }

    function checkFinished() {
        if (anodeW <= 5 && !isFinished) {
            isFinished = true;
            setMessage("粗銅の電気分解が完了しました。陰極に純銅が析出し、陽極下には陽極泥が沈殿しました。<br>リセットボタンで最初からやり直してください。");
        }
    }

    function updateMessage() {
        if (!isRunning) {
            setMessage("手順：スイッチをタップして電気分解を開始してください。<br>陽極（粗銅）、陰極（純銅）、電解液（CuSO₄水溶液）。");
        } else {
            setMessage("電気分解中。粗銅が溶け出します。Cu → Cu²⁺ + 2e⁻<br>銅イオンは陰極へ、電子は導線を通って陰極へ向かいます。");
        }
    }

    function setMessage(text, isError = false) {
        let msgArea = document.getElementById('message-area');
        msgArea.innerHTML = text;
        msgArea.style.background = isError ? "rgba(255, 200, 200, 0.95)" : "rgba(255, 255, 255, 0.95)";
        msgArea.style.color = isError ? "#721c24" : "#333";
    }

    function mousePressed(event) {
        if (event && event.target && event.target.tagName !== 'CANVAS') return;
        if (isFinished) return;

        if (dist(mouseX, mouseY, switchX + switchW / 2, switchY + switchH / 2) < 30) {
            isRunning = !isRunning;
            updateMessage();
            return false; 
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        calculatePositions(); 
    }
</script>

</body>
</html>
