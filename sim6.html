<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ガスバーナー直接操作シミュレーター（スマホ完全対応版）</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #fdfdfd; font-family: 'Hiragino Sans', sans-serif; touch-action: none; }
        
        #message-area {
            position: absolute; top: 0; width: 100%; background: rgba(255, 255, 255, 0.95);
            color: #333; padding: 15px; text-align: center; font-size: 15px; font-weight: bold;
            border-bottom: 2px solid #ddd; box-sizing: border-box; z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); min-height: 70px;
        }

        .btn-container {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: center; gap: 15px; z-index: 100; /* 最前面に配置して確実に押せるように */
        }

        .btn {
            background: #2c3e50; color: white; border: none; padding: 12px 20px;
            border-radius: 20px; font-weight: bold; cursor: pointer; text-decoration: none;
            font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        #reset-btn { background: #e74c3c; }
    </style>
</head>
<body>

<div id="message-area">
    手順1：まずは右側の「元栓（黒いツマミ）」を<br>タップして縦（開）にしてください。
</div>

<div class="btn-container">
    <button class="btn" id="reset-btn" onclick="resetSim()">リセット</button>
    <a href="index.html" class="btn">メニューへ戻る</a>
</div>

<script>
    // 状態変数
    let isMainGasOpen = false; 
    let isCockOpen = false;    
    let gasScrewAngle = 0;     
    let airScrewAngle = 0;     
    let matchX, matchY;        
    let isMatchLit = false;    
    let isFlameLit = false;    
    let lastMouseX = 0;
    let draggingSubject = null; 

    // 座標の定義
    let mainX, mainY, burnerX, burnerY;
    let matchBoxX, matchBoxY;
    let deskLevel;

    function setup() {
        createCanvas(windowWidth, windowHeight);
        angleMode(DEGREES);
        calculatePositions();
        resetSim(); 
    }

    window.resetSim = function() {
        isMainGasOpen = false; 
        isCockOpen = false;    
        gasScrewAngle = 0;     
        airScrewAngle = 0;     
        isMatchLit = false;    
        isFlameLit = false;    
        draggingSubject = null; 
        
        calculatePositions(); 
        updateMessage();
    };

    function calculatePositions() {
        deskLevel = height - 140; 
        
        burnerX = width * 0.35;
        burnerY = deskLevel;
        mainX = width * 0.85;
        mainY = deskLevel - 70; 
        
        // ★マッチ箱の配置: 元栓（mainX）のやや左側へ移動
        matchBoxX = mainX - 110; 
        matchBoxY = deskLevel - 40; 
        
        matchX = matchBoxX + 40;
        matchY = matchBoxY - 30;
    }

    function draw() {
        background(250); 

        // 実験台（机）
        fill(220, 220, 225); noStroke();
        rect(0, height - 140, width, 140);
        stroke(180); strokeWeight(2);
        line(0, height - 140, width, height - 140);

        drawHose();
        drawMainValve();
        drawBurner();
        drawMatchBox();
        drawMatch();
    }

    function drawMainValve() {
        push();
        translate(mainX, mainY);
        
        fill(180); stroke(100); strokeWeight(2);
        rect(-10, 0, 20, 80); 
        rect(-40, 20, 30, 20); 

        fill(200); stroke(100);
        ellipse(0, -20, 50, 15); 
        rect(-25, -20, 50, 40); 
        ellipse(0, 20, 50, 15); 

        fill(40); stroke(20);
        push();
        translate(0, -20);
        if (isMainGasOpen) rotate(0); else rotate(90); 
        rect(-18, -10, 36, 20, 10); 
        ellipse(-18, 0, 20); 
        ellipse(18, 0, 20);
        pop();
        
        fill(50); noStroke(); textSize(12); textStyle(BOLD); textAlign(CENTER);
        text("元栓", 0, 55);
        pop();
    }

    function drawHose() {
        stroke(120); strokeWeight(16); noFill(); strokeCap(ROUND);
        let startX = mainX - 40;
        let startY = mainY + 30;
        let endX = burnerX + 50; 
        let endY = burnerY - 30;
        
        bezier(startX, startY, startX - 30, startY + 60, endX + 40, endY + 60, endX, endY);
        stroke(160); strokeWeight(6);
        bezier(startX, startY, startX - 30, startY + 60, endX + 40, endY + 60, endX, endY);
    }

    function drawBurner() {
        push();
        translate(burnerX, burnerY);
        
        fill(100); stroke(60); strokeWeight(2);
        ellipse(0, 0, 110, 25); 
        rect(-55, -15, 110, 15); 
        fill(110);
        ellipse(0, -15, 110, 25); 
        
        fill(180); stroke(100);
        rect(-10, -45, 20, 30);

        push();
        translate(10, -30);
        fill(200); stroke(100);
        rect(0, -8, 20, 16); 
        fill(180);
        rect(20, -12, 16, 24, 2);
        stroke(120); strokeWeight(1);
        for(let i = 22; i < 36; i += 3) line(i, -11, i, 11); 
        
        fill(150); stroke(80); strokeWeight(2);
        push();
        translate(28, 0);
        if (isCockOpen) rotate(0); else rotate(-90); 
        rect(-4, -4, 20, 8, 3);
        pop();
        
        noStroke(); textSize(13); textStyle(BOLD); textAlign(CENTER);
        fill(0); text("コック", 30, 31); 
        fill(255); text("コック", 29, 30); 
        pop();

        drawGasScrew(-60, gasScrewAngle);
        drawAirScrew(-90, airScrewAngle);

        fill(210); stroke(120); strokeWeight(2);
        rect(-10, -200, 20, 90);
        fill(150);
        ellipse(0, -200, 20, 6); 

        if (isFlameLit) drawFlame();
        
        pop();
    }

    function drawGasScrew(yOffset, angle) {
        push();
        translate(0, yOffset);
        fill(220); stroke(100); strokeWeight(2);
        rect(-30, -10, 60, 20, 2); 
        
        stroke(140); strokeWeight(1.5);
        for(let i = -25; i <= 25; i += 4) {
            let shift = (angle * 0.5) % 4;
            let lx = i + shift;
            if (lx >= -25 && lx <= 25) line(lx, -10, lx, 10);
        }
        
        fill(100); noStroke(); textSize(10); textStyle(BOLD); textAlign(RIGHT);
        text(`ガス (${round(angle)}%)`, -35, 4);
        pop();
    }

    function drawAirScrew(yOffset, angle) {
        push();
        translate(0, yOffset);
        fill(210); stroke(100); strokeWeight(2);
        
        quad(-14, -25, 14, -25, 26, 10, -26, 10);
        rect(-30, 10, 60, 15, 2);
        
        stroke(140); strokeWeight(1.5);
        for(let i = -25; i <= 25; i += 4) {
            let shift = (angle * 0.5) % 4;
            let lx = i + shift;
            if (lx >= -25 && lx <= 25) line(lx, 10, lx, 25);
        }
        
        fill(100); noStroke(); textSize(10); textStyle(BOLD); textAlign(RIGHT);
        text(`空気 (${round(angle)}%)`, -35, 20);
        pop();
    }

    function drawFlame() {
        let heightFl = 30 + (gasScrewAngle * 0.8); 
        
        colorMode(HSB, 360, 100, 100, 100);
        let hueVal = map(airScrewAngle, 0, gasScrewAngle, 30, 200);
        if (airScrewAngle > gasScrewAngle) hueVal = 200; 
        
        noStroke();
        fill(hueVal, 80, 90, 60);
        beginShape();
        vertex(-12, -200);
        bezierVertex(-16, -200 - heightFl/2, -8, -200 - heightFl, 0, -200 - heightFl); 
        bezierVertex(8, -200 - heightFl, 16, -200 - heightFl/2, 12, -200);    
        endShape(CLOSE);
        
        if (hueVal > 150) {
            fill(190, 80, 95, 90);
            beginShape();
            vertex(-6, -200);
            bezierVertex(-8, -200 - heightFl/3, -4, -200 - heightFl*0.6, 0, -200 - heightFl*0.6); 
            bezierVertex(4, -200 - heightFl*0.6, 8, -200 - heightFl/3, 6, -200);    
            endShape(CLOSE);
        }

        if (airScrewAngle > 80 && gasScrewAngle < 50) {
            setMessage("⚠️ 空気が多すぎます！炎が（リフティング）して消えそうです。", true);
        } else if (airScrewAngle > 0 && gasScrewAngle > 0) {
             let ratio = airScrewAngle / gasScrewAngle;
             if (ratio > 0.8 && ratio < 1.2) {
                 setMessage("🎉 完璧な青い炎（完全燃焼）です！");
             } else {
                 setMessage("手順4：空気調節ネジ（上）を開いて青い炎にしてください。");
             }
        }
        colorMode(RGB, 255); 
    }

    function drawMatchBox() {
        push();
        translate(matchBoxX, matchBoxY);
        fill(240, 230, 200); stroke(180, 160, 130); strokeWeight(2);
        rect(0, 0, 70, 50, 4);
        fill(100, 50, 30); noStroke();
        rect(10, 35, 50, 10, 2); 
        fill(80); textSize(12); textStyle(BOLD); textAlign(CENTER);
        text("マッチ箱", 35, 25);
        pop();
    }

    function drawMatch() {
        push();
        translate(matchX, matchY);
        fill(230, 200, 160); stroke(180, 150, 110); strokeWeight(1);
        rect(-3, -40, 6, 80, 2); 
        fill(150, 40, 40); stroke(100, 20, 20);
        ellipse(0, -40, 12, 16); 
        
        if (isMatchLit) {
            fill(255, 120, 0, 90); noStroke();
            ellipse(0, -55, 20, 30); 
            fill(255, 220, 0, 90); ellipse(0, -50, 10, 20);
        }
        pop();
    }

    // ★スマホ用修正：ボタン要素のタッチはキャンバスで弾かないようにする
    function mousePressed(event) {
        if (event && event.target && event.target.tagName !== 'CANVAS') {
            return; // キャンバス以外の要素（ボタン等）を押した時は標準の動作をさせる
        }

        lastMouseX = mouseX;

        if (dist(mouseX, mouseY, mainX, mainY - 20) < 40) {
            isMainGasOpen = !isMainGasOpen;
            if (isFlameLit && !isMainGasOpen) isFlameLit = false; 
            updateMessage();
            return false; 
        }
        
        if (dist(mouseX, mouseY, burnerX + 38, burnerY - 30) < 30 && !isMainGasOpen) {
            setMessage("⚠️ 失敗！まずは元栓を開けてください。", true); 
            return false; 
        }
        
        if (dist(mouseX, mouseY, burnerX + 38, burnerY - 30) < 30 && isMainGasOpen) {
            isCockOpen = !isCockOpen;
            if (isFlameLit && !isCockOpen) isFlameLit = false;
            updateMessage();
            return false; 
        }

        if ((dist(mouseX, mouseY, matchX, matchY) < 30 || dist(mouseX, mouseY, matchX, matchY - 40) < 30) && !isCockOpen) {
            setMessage("⚠️ 失敗！元栓とコックを両方開けてください。", true); 
            return false;
        }
        
        if ((dist(mouseX, mouseY, matchX, matchY) < 30 || dist(mouseX, mouseY, matchX, matchY - 40) < 30) && isCockOpen) {
            draggingSubject = "match";
            return false;
        }

        let tx = mouseX - burnerX;
        let ty = mouseY - burnerY;
        
        if (ty > -110 && ty < -45 && abs(tx) < 40 && !isMatchLit && !isFlameLit) {
            setMessage("⚠️ 失敗！まずはマッチに火をつけてください。", true); 
            return false;
        }
        
        if (ty > -110 && ty < -70 && abs(tx) < 40 && (isMatchLit || isFlameLit)) {
            draggingSubject = "airScrew"; 
            return false;
        }
        if (ty > -70 && ty < -45 && abs(tx) < 40 && (isMatchLit || isFlameLit)) {
            draggingSubject = "gasScrew"; 
            return false;
        }
    }

    function mouseDragged(event) {
        if (event && event.target && event.target.tagName !== 'CANVAS') {
            return;
        }

        if (draggingSubject === "match") {
            matchX = mouseX;
            matchY = mouseY;
            
            if (!isMatchLit && 
                matchX > matchBoxX - 20 && matchX < matchBoxX + 90 && 
                matchY - 40 > matchBoxY - 20 && matchY - 40 < matchBoxY + 70) {
                isMatchLit = true; 
                setMessage("手順3：マッチの火をバーナーの口（一番上）に近づけてください。");
            }
            checkIgnite(); 
        } else if (draggingSubject === "airScrew") {
            let dx = mouseX - lastMouseX;
            airScrewAngle = constrain(airScrewAngle + dx * 0.8, 0, 100); 
            checkErrorAir();
        } else if (draggingSubject === "gasScrew") {
            let dx = mouseX - lastMouseX;
            gasScrewAngle = constrain(gasScrewAngle + dx * 0.8, 0, 100); 
            checkIgnite(); 
            checkErrorGas();
        }
        
        lastMouseX = mouseX;
        
        if (draggingSubject) return false; 
    }

    function mouseReleased(event) {
        if (event && event.target && event.target.tagName !== 'CANVAS') {
            return;
        }

        draggingSubject = null;
        
        if (isMatchLit && dist(matchX, matchY - 40, burnerX, burnerY - 200) > 100) {
            isMatchLit = false;
            matchX = matchBoxX + 40;
            matchY = matchBoxY - 30;
            if (!isFlameLit) setMessage("マッチの火が消えました。箱にこすってつけ直してください。");
        }
        
        if (gasScrewAngle === 0 && isFlameLit) {
            isFlameLit = false;
            setMessage("火が消えました。ネジ、コック、元栓をすべて閉めてください。");
        }
        // ★ ここにあった return false; を削除したことで、画面何もないところのタップが正常に抜けるようになります
    }

    function checkIgnite() {
        if (!isMainGasOpen || !isCockOpen || !isMatchLit || isFlameLit) return;
        
        if (dist(matchX, matchY - 40, burnerX, burnerY - 200) < 50) {
            setMessage("手順3：そのまま「ガス調節ネジ（下）」を右にドラッグして開いてください。");
            
            if (gasScrewAngle > 5) {
                isFlameLit = true;
                isMatchLit = false; 
                matchX = matchBoxX + 40; 
                matchY = matchBoxY - 30;
                setMessage("✅ 点火成功！手順4：空気調節ネジ（上）を右ドラッグで開いてください。");
            }
        }
    }

    function checkErrorGas() {
        if (gasScrewAngle > 5 && !isFlameLit && isMainGasOpen && isCockOpen) {
             if (!isMatchLit || dist(matchX, matchY - 40, burnerX, burnerY - 200) >= 50) {
                 setMessage("⚠️ ガス漏れ！マッチの火を近づけてからガスを開けてください！", true);
                 gasScrewAngle = 0; 
             }
        }
    }

    function checkErrorAir() {
        if (airScrewAngle > 0 && gasScrewAngle === 0 && !isFlameLit) {
             setMessage("⚠️ 失敗！ガスより先に空気を開けてはいけません。", true);
             airScrewAngle = 0; 
        }
    }

    function updateMessage() {
        if (!isMainGasOpen) {
            setMessage("手順1：まずは右側の「元栓（黒いツマミ）」を<br>タップして縦（開）にしてください。");
        } else if (!isCockOpen) {
            setMessage("手順2：次にバーナー根元の「コック」を<br>タップして縦（開）にしてください。");
        } else if (!isMatchLit && !isFlameLit) {
            setMessage("手順3：マッチを箱にこすって火をつけ、<br>バーナーの口へ持っていってください。");
        }
    }

    function setMessage(text, isError = false) {
        let msgArea = document.getElementById('message-area');
        msgArea.innerHTML = text;
        msgArea.style.background = isError ? "rgba(255, 200, 200, 0.95)" : "rgba(255, 255, 255, 0.95)";
        msgArea.style.color = isError ? "#721c24" : "#333";
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        calculatePositions(); 
    }
</script>

</body>
</html>
