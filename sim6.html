<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ガスバーナー直接操作シミュレーター</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #e0e5ec; font-family: 'Hiragino Sans', sans-serif; }
        
        /* メッセージエリア */
        #message-area {
            position: absolute; top: 0; width: 100%; background: rgba(255, 255, 255, 0.9);
            color: #333; padding: 15px; text-align: center; font-size: 14px; font-weight: bold;
            border-bottom: 2px solid #ddd; box-sizing: border-box; z-index: 10;
        }

        /* 下部ボタン */
        #back-btn {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: #2c3e50; color: white; border: none; padding: 12px 24px;
            border-radius: 20px; font-weight: bold; cursor: pointer; text-decoration: none;
            z-index: 10; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div id="message-area">
    手順1：まずは「元栓（画面左上）」を<br>タップして開いてください。
</div>
<a href="index.html" id="back-btn">メニューへ戻る</a>

<script>
    // 状態変数
    let isMainGasOpen = false; // 元栓
    let isCockOpen = false;    // コック
    let gasScrewAngle = 0;     // ガス調節ネジ（0〜100）
    let airScrewAngle = 0;     // 空気調節ネジ（0〜100）
    let matchX, matchY;        // マッチの位置
    let isMatchLit = false;    // マッチの火
    let isFlameLit = false;    // バーナーの炎
    let lastMouseY = 0;
    let draggingSubject = null; // ドラッグしている対象

    // 配置・サイズ定義（画面サイズに合わせて調整）
    let centerX, burnerY;
    let burnerScale = 0.8;
    let mainGasPos = { x: 50, y: 150 }; // 元栓の位置
    let cockPos = { x: 120, y: 150 };    // コックの位置
    const MATCH_BOX_X = 280, MATCH_BOX_Y = 150; // マッチ箱の位置

    function setup() {
        createCanvas(windowWidth, windowHeight);
        angleMode(DEGREES);
        
        centerX = width / 2;
        burnerY = height - 100;
        
        // マッチの初期位置（マッチ箱の上）
        matchX = MATCH_BOX_X + 20;
        matchY = MATCH_BOX_Y - 40;
    }

    function draw() {
        background(224, 229, 236); // 清潔感のあるグレー

        push();
        translate(centerX, burnerY);
        scale(burnerScale);
        
        // --- バーナー本体 ---
        fill(100); stroke(50); strokeWeight(2);
        rect(-15, -120, 30, 100, 5, 5, 0, 0); // チューブ

        // --- ネジ ---
        // 空気調節ネジ（上）
        drawScrew("空気調節ネジ", -110, airScrewAngle, color(80), color(50));
        // ガス調節ネジ（下）
        drawScrew("ガス調節ネジ", -70, gasScrewAngle, color(80), color(50));
        
        fill(80); rect(-30, 0, 60, 15, 5); // 土台

        // --- 炎 ---
        if (isFlameLit) {
            drawFlame();
        }
        pop();

        // --- 元栓とコック ---
        drawMainGasValve();
        drawCockValve();

        // --- マッチ箱 ---
        fill(150, 100, 50); stroke(80, 50, 20);
        rect(MATCH_BOX_X, MATCH_BOX_Y - 30, 60, 60, 5);
        fill(80, 40, 10);
        rect(MATCH_BOX_X + 10, MATCH_BOX_Y + 10, 40, 10, 3); // 側面の薬
        fill(255); textSize(12); textStyle(BOLD); textAlign(CENTER);
        text("マッチ", MATCH_BOX_X + 30, MATCH_BOX_Y + 5);

        // --- マッチ ---
        drawMatch();
    }

    // ネジの描画
    function drawScrew(name, y, angle, fillCol, strokeCol) {
        push();
        translate(0, y);
        fill(fillCol); stroke(strokeCol); strokeWeight(1.5);
        rect(-25, 0, 50, 15, 3); // ネジの横棒
        
        // 回転を表す目盛り
        stroke(strokeCol);
        for(let i=0; i<3; i++){
            let ox = map(i, 0, 2, -15, 15) + (angle % 20); // 回転に合わせて目盛りを動かす
            if(ox > 15) ox -= 30; // 範囲外に出たら戻す
            line(ox, 2, ox, 13);
        }
        
        // 名前表示
        fill(30); noStroke(); textSize(14); textStyle(NORMAL); textAlign(CENTER);
        text(name, 0, 35);
        text(`開度: ${round(angle)}%`, 0, 50);
        pop();
    }

    // 元栓の描画（画面左上）
    function drawMainGasValve() {
        push();
        translate(mainGasPos.x, mainGasPos.y);
        // ガス管
        stroke(120); strokeWeight(10);
        line(0, -30, 0, 30);
        line(0, 0, 30, 0);

        // 栓（画像のように直接いじれるように大きく）
        fill(150, 50, 50); stroke(80, 30, 30); strokeWeight(2);
        push();
        if (isMainGasOpen) rotate(0); else rotate(90); // 90度で閉
        rect(-10, -25, 20, 50, 5); // 栓の本体
        fill(255, 200, 200); rect(-3, -20, 6, 15, 2); // 栓の端の色
        pop();
        
        fill(30); noStroke(); textSize(14); textStyle(BOLD); textAlign(CENTER);
        text("元栓", 0, 60);
        pop();
    }

    // コックの描画
    function drawCockValve() {
        push();
        translate(cockPos.x, cockPos.y);
        // ガス管
        stroke(120); strokeWeight(10);
        line(-40, 0, 40, 0);

        // 栓
        fill(50, 150, 50); stroke(30, 80, 30); strokeWeight(2);
        push();
        if (isCockOpen) rotate(0); else rotate(90);
        rect(-25, -10, 50, 20, 5); // 栓の本体
        fill(200, 255, 200); rect(-20, -3, 15, 6, 2); // 栓の端の色
        pop();
        
        fill(30); noStroke(); textSize(14); textStyle(BOLD); textAlign(CENTER);
        text("コック", 0, 60);
        pop();
    }

    // 炎の描画（完全燃焼の色変化）
    function drawFlame() {
        let gasOpening = gasScrewAngle;
        let airOpening = airScrewAngle;

        let height = 40 + (gasOpening * 0.8); // ガスの量で高さが決まる
        
        // 空気の量で色が変わる（Hsbカラーモードを利用）
        colorMode(HSB, 360, 100, 100, 100);
        
        // 色相: オレンジ(30) $\rightarrow$ 青(200)
        let hueVal = map(airOpening, 0, gasOpening, 30, 200);
        if(airOpening > gasOpening) hueVal = 200; // 空気過多は青

        fill(hueVal, 80, 90, 80); // 炎の色
        noStroke();
        // 炎の形（3D風に2重にする）
        for(let i=0; i<2; i++){
            let w = map(i, 0, 1, 30, 15);
            let h = map(i, 0, 1, height, height * 0.8);
            beginShape();
            vertex(-w/2, -120);
            bezierVertex(-w, -120 - h/2, -w/4, -120 - h, 0, -120 - h); // 左側
            bezierVertex(w/4, -120 - h, w, -120 - h/2, w/2, -120);    // 右側
            endShape(CLOSE);
        }
        
        // 警告：空気入れすぎ（リフティング）
        if(airOpening > 80 && gasOpening < 50){
            setMessage("⚠️ 空気が多すぎます！炎が浮き上がって（リフティング）消えそうです。", true);
            fill(200, 30, 95, 70); // 薄い青
            ellipse(0, -120 - height - 10, 30, 40); // 浮いた炎
        } else if(airOpening > 0 && gasOpening > 0) {
             let ratio = airOpening / gasOpening;
             if(ratio > 0.8 && ratio < 1.2) {
                 setMessage("🎉 完璧な青い炎（完全燃焼）です！");
             } else {
                 setMessage("手順4：空気調節ネジ（上）を開いて青い炎にしてください。");
             }
        }

        colorMode(RGB, 255); // 元のカラーモードに戻す
    }

    // マッチの描画
    function drawMatch() {
        push();
        translate(matchX, matchY);
        fill(220, 180, 130); stroke(180, 140, 100); strokeWeight(1);
        rect(-3, -40, 6, 80, 2); // 棒

        fill(100, 30, 30); stroke(80, 20, 20);
        ellipse(0, -40, 10, 15); // 薬頭

        if (isMatchLit) {
            fill(255, 100, 0, 90); noStroke();
            ellipse(0, -55, 15, 25); // マッチの火
            fill(255, 200, 0, 90); ellipse(0, -50, 8, 15);
        }
        pop();
    }

    // マウス/タッチ操作
    function mousePressed() {
        lastMouseY = mouseY;

        // --- 操作対象の判定 ---
        // 元栓（タップ）
        if (dist(mouseX, mouseY, mainGasPos.x, mainGasPos.y) < 30) {
            isMainGasOpen = !isMainGasOpen;
            if (isFlameLit && !isMainGasOpen) {
                isFlameLit = false; // 元栓閉めたら火は消える（逆火注意だがシンプルに）
            }
            updateMessage();
            return;
        }
        // コック（タップ）
        if (dist(mouseX, mouseY, cockPos.x, cockPos.y) < 30) {
            isCockOpen = !isCockOpen;
            if (isFlameLit && !isCockOpen) {
                isFlameLit = false;
            }
            updateMessage();
            return;
        }

        // マッチ（ドラッグ開始）
        if (dist(mouseX, mouseY, matchX, matchY) < 30) {
            draggingSubject = "match";
            if(matchX > MATCH_BOX_X && matchX < MATCH_BOX_X + 60 && matchY > MATCH_BOX_Y - 30 && matchY < MATCH_BOX_Y + 30){
                isMatchLit = true; // マッチ箱から動かしたら火がつく
                setMessage("手順3：マッチの火をバーナーの口に近づけてください。");
            }
            return;
        }

        // --- バーナーのネジ ---
        let tx = mouseX - centerX;
        let ty = mouseY - burnerY;
        
        // 空気調節ネジ
        if(ty > -110 * burnerScale - 10 && ty < -110 * burnerScale + 25 && abs(tx) < 25 * burnerScale){
            draggingSubject = "airScrew";
            return;
        }
        // ガス調節ネジ
        if(ty > -70 * burnerScale - 10 && ty < -70 * burnerScale + 25 && abs(tx) < 25 * burnerScale){
            draggingSubject = "gasScrew";
            return;
        }
    }

    function mouseDragged() {
        if (draggingSubject === "match") {
            matchX = mouseX;
            matchY = mouseY;
            check点火(); // ドラッグ中に点火判定
        } else if (draggingSubject === "airScrew") {
            let dy = mouseY - lastMouseY;
            airScrewAngle = constrain(airScrewAngle - dy * 0.5, 0, 100); // 上にドラッグで開く
            check失敗_空気先();
        } else if (draggingSubject === "gasScrew") {
            let dy = mouseY - lastMouseY;
            gasScrewAngle = constrain(gasScrewAngle - dy * 0.5, 0, 100); // 上にドラッグで開く
            check失敗_ガス漏れ();
        }
        
        lastMouseY = mouseY;
    }

    function mouseReleased() {
        draggingSubject = null;
        if(isMatchLit && dist(matchX, matchY, centerX, burnerY - 120 * burnerScale) > 100){
            // マッチがバーナーから離れたら、火を消して元の位置に戻す
            isMatchLit = false;
            matchX = MATCH_BOX_X + 20;
            matchY = MATCH_BOX_Y - 40;
            if(!isFlameLit) setMessage("マッチの火が消えました。手順2からやり直してください。");
        }
        
        if (gasScrewAngle === 0 && isFlameLit) {
            isFlameLit = false;
            setMessage("火が消えました。ネジ、コック、元栓をすべて閉めてください。");
        }
    }

    // 点火の論理判定
    function check点火() {
        if (!isMainGasOpen || !isCockOpen || !isMatchLit || isFlameLit) return;

        // マッチがバーナーの口に近いか
        if (dist(matchX, matchY, centerX, burnerY - 120 * burnerScale) < 40) {
            setMessage("手順3：そのまま「ガス調節ネジ（下）」を上にドラッグして少し開いてください。");
            
            // ガス調節ネジが少し開いたら点火
            if (gasScrewAngle > 5) {
                isFlameLit = true;
                isMatchLit = false; // 点火したらマッチの火は消す（戻す）
                matchX = MATCH_BOX_X + 20;
                matchY = MATCH_BOX_Y - 40;
                setMessage("✅ 点火成功！手順4：空気調節ネジ（上）を開いて青い炎にしてください。");
            }
        }
    }

    // 失敗・警告判定
    function check失敗_ガス漏れ() {
        if(gasScrewAngle > 5 && isMatchLit === false && isFlameLit === false && isMainGasOpen && isCockOpen){
             setMessage("⚠️ ガス漏れ！マッチの火を近づけずにガスを開けないでください！", true);
             gasScrewAngle = 0; // 強制的に閉める
        }
    }

    function check失敗_空気先() {
        if(airScrewAngle > 0 && gasScrewAngle === 0 && isFlameLit === false){
             setMessage("⚠️ 失敗！ガスより先に空気を開けてはいけません。", true);
             airScrewAngle = 0; // 強制的に閉める
        }
    }

    // メッセージの更新（元栓・コック操作時）
    function updateMessage() {
        if (!isMainGasOpen) {
            setMessage("手順1：まずは「元栓（画面左上）」を<br>タップして開いてください。");
        } else if (!isCockOpen) {
            setMessage("手順2：次に「コック（元栓の右）」を<br>タップして開いてください。");
        } else if (!isMatchLit && !isFlameLit) {
            setMessage("手順3：マッチ（画面右上）を「マッチ箱」からバーナーへドラッグしてください。<br>（ドラッグすると点火します）");
        }
    }

    function setMessage(text, isError = false) {
        let msgArea = document.getElementById('message-area');
        msgArea.innerHTML = text;
        msgArea.style.background = isError ? "rgba(255, 200, 200, 0.9)" : "rgba(255, 255, 255, 0.9)";
        msgArea.style.color = isError ? "#721c24" : "#333";
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        centerX = width / 2;
        burnerY = height - 100;
    }
</script>

</body>
</html>
